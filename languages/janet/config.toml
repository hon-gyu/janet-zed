name = "Janet"
grammar = "janet"
path_suffixes = ["janet"]
line_comments = ["# "]
autoclose_before = "])}"

[[brackets]]
start = "("
end = ")"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = true

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
